name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        run: ./scripts/release/verify-version-sync.sh

      - name: Build shared package
        run: pnpm --filter @kairos/shared build

      - name: Frontend typecheck
        run: pnpm --filter @kairos/desktop-frontend typecheck

      - name: Frontend tests
        run: pnpm --filter @kairos/desktop-frontend test

      - name: Build desktop frontend assets
        run: pnpm --filter @kairos/desktop-frontend build

      - name: Desktop backend tests
        run: cd apps/desktop && go test ./...

      - name: Extension release verification
        run: pnpm --filter kairos-vscode verify:release

      - name: Extension package sanity
        run: pnpm --filter kairos-vscode package:vsix

      - name: Validate extension package contents
        shell: bash
        run: |
          VSIX_PATH="$(ls -1 apps/vscode-extension/dist/*.vsix | head -n1)"
          ./scripts/release/validate-extension-vsix.sh "$VSIX_PATH"

      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: kairos-vsix-ci
          path: apps/vscode-extension/dist/*.vsix

  desktop-build-sanity:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y -o Acquire::Retries=3 -o Dpkg::Use-Pty=0
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libgtk-3-dev libglib2.0-dev pkg-config zip
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.1-dev
          compat_pc_dir="${RUNNER_TEMP}/pkgconfig-compat"
          mkdir -p "$compat_pc_dir"
          while IFS= read -r dir; do
            if [[ -f "$dir/webkit2gtk-4.1.pc" && ! -f "$compat_pc_dir/webkit2gtk-4.0.pc" ]]; then
              ln -sf "$dir/webkit2gtk-4.1.pc" "$compat_pc_dir/webkit2gtk-4.0.pc"
            fi
            if [[ -f "$dir/javascriptcoregtk-4.1.pc" && ! -f "$compat_pc_dir/javascriptcoregtk-4.0.pc" ]]; then
              ln -sf "$dir/javascriptcoregtk-4.1.pc" "$compat_pc_dir/javascriptcoregtk-4.0.pc"
            fi
          done < <(find /usr/lib -type d -name pkgconfig 2>/dev/null)
          echo "PKG_CONFIG_PATH=${compat_pc_dir}:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Desktop release build sanity
        run: make desktop-release-build
