name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.1)"
        required: true
        type: string

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      KAIROS_BUILD_CHANNEL: ${{ contains((github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name), '-') && 'prerelease' || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y -o Acquire::Retries=3 -o Dpkg::Use-Pty=0
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libgtk-3-dev libglib2.0-dev pkg-config zip
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.0-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        shell: bash
        run: |
          ./scripts/release/verify-version-sync.sh
          TAG_VERSION="${RELEASE_TAG#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "release tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop package
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export KAIROS_GO_LDFLAGS="-X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.DesktopVersion=${VERSION} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildChannel=${KAIROS_BUILD_CHANNEL} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.GitCommit=${COMMIT} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildDate=${BUILD_DATE}"
          make desktop-release-build

      - name: Collect release artifacts
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          OUT_DIR="dist/release/desktop/${VERSION}/${{ matrix.platform }}"
          ./scripts/release/collect-desktop-artifacts.sh "${VERSION}" "${{ matrix.platform }}" "${OUT_DIR}"
          ./scripts/release/validate-desktop-artifacts.sh "${OUT_DIR}"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/release/desktop/**

  publish-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release/desktop
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: dist/release/desktop/**
