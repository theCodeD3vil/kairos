name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.1)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-22.04
            platform: linux
          # - os: windows-latest
          #   platform: windows
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      KAIROS_BUILD_CHANNEL: ${{ contains((github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name), '-') && 'prerelease' || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod
          cache-dependency-path: apps/desktop/go.sum

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y -o Acquire::Retries=3 -o Dpkg::Use-Pty=0
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libgtk-3-dev libglib2.0-dev pkg-config zip
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.1-dev
          compat_pc_dir="${RUNNER_TEMP}/pkgconfig-compat"
          mkdir -p "$compat_pc_dir"
          while IFS= read -r dir; do
            if [[ -f "$dir/webkit2gtk-4.1.pc" && ! -f "$compat_pc_dir/webkit2gtk-4.0.pc" ]]; then
              ln -sf "$dir/webkit2gtk-4.1.pc" "$compat_pc_dir/webkit2gtk-4.0.pc"
            fi
            if [[ -f "$dir/javascriptcoregtk-4.1.pc" && ! -f "$compat_pc_dir/javascriptcoregtk-4.0.pc" ]]; then
              ln -sf "$dir/javascriptcoregtk-4.1.pc" "$compat_pc_dir/javascriptcoregtk-4.0.pc"
            fi
          done < <(find /usr/lib -type d -name pkgconfig 2>/dev/null)
          echo "PKG_CONFIG_PATH=${compat_pc_dir}:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        shell: bash
        run: |
          ./scripts/release/verify-version-sync.sh
          TAG_VERSION="${RELEASE_TAG#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "release tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop package
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export KAIROS_DESKTOP_CGO_LDFLAGS="-framework UniformTypeIdentifiers"
          fi
          VERSION="${RELEASE_TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export KAIROS_GO_LDFLAGS="-X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.DesktopVersion=${VERSION} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildChannel=${KAIROS_BUILD_CHANNEL} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.GitCommit=${COMMIT} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildDate=${BUILD_DATE}"
          make desktop-release-build

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERT_BASE64 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
        run: |
          if [[ -z "${APPLE_DEVELOPER_CERT_BASE64:-}" || -z "${APPLE_DEVELOPER_CERT_PASSWORD:-}" ]]; then
            echo "Skipping certificate import: Apple signing secrets are not configured."
            exit 0
          fi
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "$APPLE_DEVELOPER_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "MACOS_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign and notarize macOS app
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERT_BASE64 }}
          APPLE_DEVELOPER_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "${APPLE_DEVELOPER_CERT_BASE64:-}" || -z "${APPLE_DEVELOPER_CERT_PASSWORD:-}" || -z "${APPLE_DEVELOPER_IDENTITY:-}" || -z "${APPLE_TEAM_ID:-}" || -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "Skipping macOS signing/notarization: one or more Apple secrets are not configured."
            exit 0
          fi
          APP_PATH="$(find apps/desktop/build/bin -maxdepth 1 -name '*.app' | head -n1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "macOS app bundle not found for signing" >&2
            exit 1
          fi

          codesign --force --deep --options runtime --sign "$APPLE_DEVELOPER_IDENTITY" "$APP_PATH"
          ZIP_PATH="${RUNNER_TEMP}/Kairos-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Build macOS (.dmg) Installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install create-dmg
          ./scripts/release/build-macos-dmg.sh

      - name: Build Ubuntu Data (.deb) Package
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/release/build-ubuntu-deb.sh

      - name: Collect release artifacts
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          OUT_DIR="dist/release/desktop/${VERSION}/${{ matrix.platform }}"
          ./scripts/release/collect-desktop-artifacts.sh "${VERSION}" "${{ matrix.platform }}" "${OUT_DIR}"
          ./scripts/release/validate-desktop-artifacts.sh "${OUT_DIR}"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/release/desktop/**

  publish-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release/desktop
          merge-multiple: true

      - name: Resolve curated release notes
        shell: bash
        run: |
          RELEASE_NOTES_PATH="$(./scripts/release/resolve-release-notes.sh "$RELEASE_TAG")"
          echo "RELEASE_NOTES_PATH=$RELEASE_NOTES_PATH" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: false
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: dist/release/desktop/**
