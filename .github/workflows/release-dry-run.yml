name: Release Dry Run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "apps/desktop/**"
      - "apps/vscode-extension/**"
      - "packages/shared/**"
      - "scripts/release/**"
      - "VERSION"
      - "Makefile"

jobs:
  desktop-dry-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    env:
      KAIROS_BUILD_CHANNEL: prerelease
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y -o Acquire::Retries=3 -o Dpkg::Use-Pty=0
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libgtk-3-dev libglib2.0-dev pkg-config zip
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 libwebkit2gtk-4.0-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        shell: bash
        run: |
          ./scripts/release/verify-version-sync.sh
          RELEASE_TAG="v$(cat VERSION)"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop package
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export KAIROS_GO_LDFLAGS="-X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.DesktopVersion=${VERSION} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildChannel=${KAIROS_BUILD_CHANNEL} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.GitCommit=${COMMIT} -X github.com/michaelnji/kairos/apps/desktop/internal/buildinfo.BuildDate=${BUILD_DATE}"
          make desktop-release-build

      - name: Collect dry-run desktop artifacts
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          OUT_DIR="dist/release-dry-run/desktop/${VERSION}/${{ matrix.platform }}"
          ./scripts/release/collect-desktop-artifacts.sh "${VERSION}" "${{ matrix.platform }}" "${OUT_DIR}"
          ./scripts/release/validate-desktop-artifacts.sh "${OUT_DIR}"

      - name: Upload dry-run desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dry-run-${{ matrix.platform }}
          path: dist/release-dry-run/desktop/**

  extension-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version sync
        run: |
          ./scripts/release/verify-version-sync.sh
          RELEASE_TAG="v$(cat VERSION)"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Verify extension release build
        run: pnpm --filter kairos-vscode verify:release

      - name: Build VSIX
        run: pnpm --filter kairos-vscode package:vsix

      - name: Validate VSIX package contents
        shell: bash
        run: |
          VSIX_PATH="$(ls -1 apps/vscode-extension/dist/*.vsix | head -n1)"
          ./scripts/release/validate-extension-vsix.sh "$VSIX_PATH"

      - name: Generate VSIX checksums
        run: ./scripts/release/write-checksums.sh apps/vscode-extension/dist apps/vscode-extension/dist/SHA256SUMS-vsix.txt

      - name: Upload dry-run extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-dry-run-vsix
          path: |
            apps/vscode-extension/dist/*.vsix
            apps/vscode-extension/dist/SHA256SUMS-vsix.txt
